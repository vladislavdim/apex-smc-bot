name: APEX AI Auto-Fix

on:
  workflow_dispatch:
    inputs:
      error_log:
        description: 'Вставь текст ошибки из Render'
        required: true
        type: string
  push:
    branches: [main]
    paths:
      - 'bot.py'

jobs:
  ai-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install groq

      - name: Check syntax
        id: syntax
        run: |
          if python3 -m py_compile bot.py 2>/tmp/err.txt; then
            echo "ok=true" >> $GITHUB_OUTPUT
          else
            echo "ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Fix syntax error
        if: steps.syntax.outputs.ok == 'false'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python3 .github/scripts/fix_syntax.py

      - name: Fix from error log
        if: github.event_name == 'workflow_dispatch'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ERROR_LOG: ${{ github.event.inputs.error_log }}
        run: python3 .github/scripts/fix_error.py

      - name: Verify
        run: python3 -m py_compile bot.py && echo "Syntax OK"

      - name: Commit fix
        run: |
          git config user.name "APEX AI"
          git config user.email "apex@bot.ai"
          git add bot.py
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "AI fix $(date '+%Y-%m-%d %H:%M')"
            git push
          fi
