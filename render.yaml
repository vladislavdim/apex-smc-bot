services:
  - type: worker
    name: apex-smc-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    autoDeploy: true
    buildFilter:
      ignoredPaths:
        - brain.db
        - core/learning.py
        - core/smc_engine.py
        - apex_autopilot.py
        - groq_extensions.py
        - brain_router.py
        - web_learner.py
